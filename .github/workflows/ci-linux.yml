name: CI (Linux)

# Trigger on PRs and pushes to long-lived branches, plus a manual
# `workflow_dispatch` so this workflow can be invoked ad hoc from the
# GitHub UI / `gh workflow run` against any branch (e.g. running `main`
# on demand or re-running on a feature branch without opening a PR).
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to build (informational; the
          run still uses the ref selected in the UI dropdown).'
        required: false
        default: ''

jobs:
  build-and-test:
    name: Build & run tests (Ubuntu 24.04 container)
    runs-on: ubuntu-latest

    steps:
      # The repo's Actions policy disallows third-party actions
      # (including actions/checkout). Clone manually with the
      # auto-provided GITHUB_TOKEN instead. We check out the exact
      # ref that triggered the workflow and recursively initialize
      # submodules (deps/common-lib-c).
      - name: Checkout repository (manual git clone)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git -c protocol.version=2 fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD
          # Submodule URLs in .gitmodules use https://github.com/...,
          # which is fine for public repos but we inject the same
          # token in case any submodule is private.
          git submodule sync --recursive
          git -c "url.https://x-access-token:${GH_TOKEN}@github.com/.insteadOf=https://github.com/" \
              submodule update --init --recursive --depth=1

      - name: Build dev container image
        run: |
          docker build -t http-c-build:ubuntu24 -f .devcontainer/Dockerfile .

      - name: Build and run tests inside container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            http-c-build:ubuntu24 \
            bash .devcontainer/run-tests.sh
